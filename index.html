<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Crazy Chicken 3D</title>
    <meta name="description" content="Become a fighting chicken in Crazy Chicken 3D">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; color:white; }
        canvas { display:block; }
        #ui { position:absolute; top:10px; left:10px; z-index:100; pointer-events:none; }
        #ui h1 { margin:0; font-size:28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #status { margin:5px 0; font-size:18px; }
        #coins { position:absolute; top:10px; right:120px; background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:8px; font-size:18px; }
        #level { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:8px 16px; border-radius:8px; font-size:18px; }
        #instructions { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:12px 24px; border-radius:10px; text-align:center; font-size:15px; }
        
        button { padding:10px 20px; font-size:18px; margin:5px; cursor:pointer; background:#ffaa00; border:none; border-radius:8px; color:black; font-weight:bold; }
        #shop-btn { position:absolute; top:70px; left:10px; z-index:101; pointer-events:auto; }

        /* Shop Modal */
        #shop { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; padding:20px; border-radius:15px; width:620px; max-height:85vh; overflow-y:auto; display:none; z-index:200; box-shadow:0 0 30px rgba(255,170,0,0.6); }
        #shop h2 { text-align:center; margin:10px; color:#ffaa00; }
        .skin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; }
        .skin-card { background:#333; border-radius:12px; padding:10px; text-align:center; cursor:pointer; transition:0.2s; }
        .skin-card:hover { transform:scale(1.05); background:#444; }
        .skin-card.locked { opacity:0.6; }
        .skin-card img, .skin-preview { width:100%; height:120px; background:#111; border-radius:8px; }
        .skin-name { margin:8px 0 4px; font-weight:bold; }
        .skin-price { color:#ffdd00; font-size:15px; }
        .equipped { border:3px solid #00ff00 !important; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Crazy Chicken 3D</h1>
        <div id="status">Score: 0 | Alive: 8</div>
    </div>
    <div id="coins">Coins: <span id="coin-count">0</span></div>
    <div id="level">Level: Ireland</div>
    
    <button id="shop-btn" onclick="toggleShop()">🛒 Shop</button>

    <div id="instructions">
        W/↑ Forward • A/D or ←/→ Turn • S/↓ Back<br>
        Mouse to look • Knock others off! Last one wins!
    </div>

    <!-- Win Screen -->
    <div id="win" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:30px 50px; border-radius:15px; text-align:center; display:none; z-index:200;">
        <h2>YOU WIN! 🏆</h2>
        <p id="win-text"></p>
        <button onclick="nextLevel()">Next Level</button>
    </div>

    <!-- Game Over -->
    <div id="gameover" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:30px 50px; border-radius:15px; text-align:center; display:none; z-index:200;">
        <h2>Game Over</h2>
        <p>You were knocked out!</p>
        <button onclick="restart()">Play Again</button>
    </div>

    <!-- Skin Shop -->
    <div id="shop">
        <h2>🐾 Skin Shop</h2>
        <div class="skin-grid" id="skin-grid"></div>
        <button onclick="toggleShop()" style="width:100%; margin-top:15px; background:#666;">Close Shop</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>

    <script>
        // ============== GAME VARIABLES ==============
        let scene, camera, renderer, world;
        let playerMesh, playerBody;
        let aiChickens = [];
        let currentLevel = 0;
        let score = 0;
        let coins = 0;
        let gameOverFlag = false;
        let keys = {};
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentSkin = "Chicken"; // default

        // Skin Database
        const skins = [
            { id: "Chicken", name: "Classic Chicken", color: 0xffaa00, price: 0, unlocked: true },
            { id: "Rooster", name: "Fierce Rooster", color: 0xff5500, price: 150, unlocked: false },
            { id: "Sheep", name: "Woolly Sheep", color: 0xeeeeee, price: 300, unlocked: false },
            { id: "Cat", name: "Sneaky Cat", color: 0x5555ff, price: 400, unlocked: false },
            { id: "Cow", name: "Crazy Cow", color: 0x442200, price: 250, unlocked: false },
            { id: "Pig", name: "Chubby Pig", color: 0xff88aa, price: 200, unlocked: false }
        ];

        const levels = [
            { name: "Ireland", color: 0x3d8c40 },
            { name: "Sweden", color: 0xaaaaaa },
            { name: "Poland", color: 0x8b5a2b },
            { name: "Ohio", color: 0x555555 },
            { name: "Egypt", color: 0xd2b48c },
            { name: "Secret Level", color: 0x330033 }
        ];

        // Load saved data
        function loadSave() {
            const savedCoins = localStorage.getItem("crazyChickenCoins");
            const savedSkins = localStorage.getItem("crazyChickenSkins");
            const savedCurrent = localStorage.getItem("crazyChickenCurrentSkin");
            
            if (savedCoins) coins = parseInt(savedCoins);
            if (savedSkins) {
                const unlocked = JSON.parse(savedSkins);
                skins.forEach(s => {
                    if (unlocked.includes(s.id)) s.unlocked = true;
                });
            }
            if (savedCurrent) currentSkin = savedCurrent;
            
            document.getElementById("coin-count").textContent = coins;
        }

        function saveGame() {
            localStorage.setItem("crazyChickenCoins", coins);
            localStorage.setItem("crazyChickenSkins", JSON.stringify(skins.filter(s => s.unlocked).map(s => s.id)));
            localStorage.setItem("crazyChickenCurrentSkin", currentSkin);
        }

        // ============== AUDIO ==============
        function playSound(freq, duration, type = 'sine') {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = 0.25;
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        // ============== CREATE CHICKEN WITH SKIN ==============
        function createAnimal(skinId, isPlayer = false) {
            const skin = skins.find(s => s.id === skinId) || skins[0];
            const group = new THREE.Group();

            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.9, 1.5, 2.4),
                new THREE.MeshLambertMaterial({ color: skin.color })
            );
            body.position.y = 1.1;
            body.castShadow = true;
            group.add(body);

            // Head
            const headColor = skinId === "Sheep" ? 0xdddddd : (skinId === "Pig" ? 0xff99bb : 0xff5555);
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.75, 16, 16),
                new THREE.MeshLambertMaterial({ color: headColor })
            );
            head.position.set(0, 2.4, 1.2);
            group.add(head);

            // Special features
            if (skinId === "Rooster") {
                const comb = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.2), new THREE.MeshLambertMaterial({color:0xff0000}));
                comb.position.set(0, 3.1, 1.2);
                group.add(comb);
            } else if (skinId === "Sheep") {
                // wool fluff
                const fluff = new THREE.Mesh(new THREE.SphereGeometry(1.1, 12, 12), new THREE.MeshLambertMaterial({color:0xffffff}));
                fluff.position.set(0, 1.8, 0);
                group.add(fluff);
            } else if (skinId === "Cat") {
                const ear1 = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.6, 4), new THREE.MeshLambertMaterial({color:0x333366}));
                ear1.position.set(-0.4, 3.0, 1.0);
                ear1.rotation.z = 0.8;
                group.add(ear1);
                const ear2 = ear1.clone();
                ear2.position.x = 0.4;
                ear2.rotation.z = -0.8;
                group.add(ear2);
            }

            if (isPlayer) group.userData.isPlayer = true;
            return group;
        }

        // ============== SCENE SETUP ==============
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88ccff, 20, 120);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            world = new CANNON.World();
            world.gravity.set(0, -25, 0);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.1);
            sun.position.set(25, 40, 25);
            sun.castShadow = true;
            scene.add(sun);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        }

        function createArena(levelIndex) {
            while (scene.children.length > 2) scene.remove(scene.children[2]);
            aiChickens.forEach(c => world.removeBody(c.body));
            aiChickens = [];

            const lvl = levels[levelIndex];
            document.getElementById('level').textContent = `Level: ${lvl.name}`;

            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(60, 60),
                new THREE.MeshLambertMaterial({ color: lvl.color })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
            groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(groundBody);

            // Walls
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            function addWall(x, z, w, d) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 6, d), wallMat);
                wall.position.set(x, 3, z);
                scene.add(wall);
                const wb = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, 3, d/2)) });
                wb.position.set(x, 3, z);
                world.addBody(wb);
            }
            addWall(0, -30, 60, 2); addWall(0, 30, 60, 2);
            addWall(-30, 0, 2, 60); addWall(30, 0, 2, 60);

            // Player
            if (playerMesh) scene.remove(playerMesh);
            playerMesh = createAnimal(currentSkin, true);
            playerMesh.position.set(0, 1, 0);
            scene.add(playerMesh);

            if (playerBody) world.removeBody(playerBody);
            playerBody = new CANNON.Body({
                mass: 8,
                shape: new CANNON.Box(new CANNON.Vec3(0.95, 0.9, 1.2)),
                position: new CANNON.Vec3(0, 2, 0)
            });
            world.addBody(playerBody);

            // AI opponents
            const count = 8 + levelIndex * 2;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 14 + Math.random() * 12;
                const aiMesh = createAnimal("Chicken"); // AI always classic chicken
                aiMesh.position.set(Math.cos(angle)*dist, 1, Math.sin(angle)*dist);
                scene.add(aiMesh);

                const aiBody = new CANNON.Body({
                    mass: 6,
                    shape: new CANNON.Box(new CANNON.Vec3(0.95, 0.9, 1.2)),
                    position: new CANNON.Vec3(aiMesh.position.x, 2, aiMesh.position.z)
                });
                world.addBody(aiBody);
                aiChickens.push({ mesh: aiMesh, body: aiBody, health: 100 });
            }
        }

        function updateCamera() {
            const ideal = new THREE.Vector3(0, 11, 20);
            ideal.applyQuaternion(playerMesh.quaternion);
            ideal.add(playerMesh.position);
            camera.position.lerp(ideal, 0.1);
            camera.lookAt(playerMesh.position.x, playerMesh.position.y + 3.5, playerMesh.position.z);
        }

        function checkCollisions() {
            aiChickens = aiChickens.filter(ai => ai.health > 0);
            aiChickens.forEach(ai => {
                const dist = playerBody.position.distanceTo(ai.body.position);
                if (dist < 3.2) {
                    const dir = new CANNON.Vec3().copy(ai.body.position).vsub(playerBody.position).unit();
                    ai.body.applyImpulse(dir.scale(50), ai.body.position);
                    ai.health -= 30;
                    playSound(150, 120, 'sawtooth');
                    score += 15;
                    coins += 3; // earn coins
                    document.getElementById("coin-count").textContent = coins;
                }
                if (Math.abs(ai.body.position.x) > 28 || Math.abs(ai.body.position.z) > 28) {
                    ai.health = 0;
                    scene.remove(ai.mesh);
                    world.removeBody(ai.body);
                    playSound(700, 400);
                }
            });
            saveGame();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameOverFlag) return;

            world.step(1/60);

            // Player movement
            let moveX = 0, moveZ = 0;
            if (keys['w'] || keys['arrowup']) moveZ = -1;
            if (keys['s'] || keys['arrowdown']) moveZ = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;

            if (moveX || moveZ) {
                const speed = 24;
                playerBody.velocity.x = moveX * speed;
                playerBody.velocity.z = moveZ * speed;
                if (Math.random() < 0.1) playSound(750, 40);
            }

            playerMesh.position.copy(playerBody.position);
            playerMesh.quaternion.copy(playerBody.quaternion);

            // AI
            aiChickens.forEach(ai => {
                if (ai.health <= 0) return;
                const toP = new CANNON.Vec3().copy(playerBody.position).vsub(ai.body.position).unit();
                ai.body.velocity.x = toP.x * 11 + (Math.random()-0.5)*5;
                ai.body.velocity.z = toP.z * 11 + (Math.random()-0.5)*5;

                ai.mesh.position.copy(ai.body.position);
                ai.mesh.quaternion.copy(ai.body.quaternion);
            });

            checkCollisions();
            updateCamera();

            document.getElementById('status').textContent = `Score: ${score} | Alive: ${aiChickens.length}`;

            if (aiChickens.length === 0) {
                gameOverFlag = true;
                coins += 50 + currentLevel * 30;
                document.getElementById("coin-count").textContent = coins;
                document.getElementById('win-text').innerHTML = `You survived <strong>${levels[currentLevel].name}</strong>!<br>+${50 + currentLevel * 30} coins`;
                document.getElementById('win').style.display = 'block';
                saveGame();
            }

            renderer.render(scene, camera);
        }

        // ============== SHOP ==============
        function renderShop() {
            const grid = document.getElementById("skin-grid");
            grid.innerHTML = "";

            skins.forEach(skin => {
                const card = document.createElement("div");
                card.className = `skin-card ${skin.unlocked ? '' : 'locked'} ${currentSkin === skin.id ? 'equipped' : ''}`;
                
                card.innerHTML = `
                    <div class="skin-preview" style="background:${skin.color.toString(16).padStart(6,'0')}"></div>
                    <div class="skin-name">${skin.name}</div>
                    ${skin.price === 0 ? '<div style="color:#0f0">Free</div>' : 
                      skin.unlocked ? '<div style="color:#0f0">Unlocked</div>' : 
                      `<div class="skin-price">💰 ${skin.price} coins</div>`}
                `;

                card.onclick = () => {
                    if (!skin.unlocked) {
                        if (coins >= skin.price) {
                            coins -= skin.price;
                            skin.unlocked = true;
                            document.getElementById("coin-count").textContent = coins;
                            renderShop();
                            saveGame();
                            alert(`Unlocked ${skin.name}!`);
                        } else {
                            alert("Not enough coins!");
                        }
                    } else {
                        currentSkin = skin.id;
                        renderShop();
                        saveGame();
                        alert(`Equipped ${skin.name}`);
                        // Restart current level with new skin
                        createArena(currentLevel);
                    }
                };
                grid.appendChild(card);
            });
        }

        window.toggleShop = function() {
            const shop = document.getElementById("shop");
            shop.style.display = shop.style.display === "block" ? "none" : "block";
            if (shop.style.display === "block") renderShop();
        };

        window.nextLevel = function() {
            document.getElementById('win').style.display = 'none';
            currentLevel = Math.min(currentLevel + 1, levels.length - 1);
            gameOverFlag = false;
            createArena(currentLevel);
        };

        window.restart = function() {
            document.getElementById('gameover').style.display = 'none';
            currentLevel = 0;
            score = 0;
            gameOverFlag = false;
            createArena(0);
        };

        // ============== START GAME ==============
        loadSave();
        initScene();
        createArena(0);
        animate();

        console.log("%cCrazy Chicken 3D with Skin Shop loaded! 🐔🛒", "color:#ffaa00; font-size:18px");
    </script>
</body>
</html>
